<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Конвейер Бойня</title>
  <style>
    :root {
      --bg-color: #121212; --card-bg: #1c1c1e; --text-color: #f5f5f7;
      --text-muted: #8e8e93; --accent-color: #248bf2; --accent-active: #1472df;
      --danger-color: #ff453a; --success-color: #30d158; --border-color: #2c2c2e;
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background-color: var(--bg-color); color: var(--text-color);
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow-x: hidden; overflow-y: auto; box-sizing: border-box;
    }
    .app { padding: 16px; padding-bottom: 40px; max-width: 600px; margin: 0 auto; box-sizing: border-box; }
    .header-main { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px; }
    
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #1c1c1e; padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
    .tab-link { flex: 1; text-align: center; background: none; border: none; color: var(--text-muted); padding: 12px 0; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.15s ease; }
    .tab-link.active { background-color: var(--accent-color); color: #fff; }

    .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 24px 0 8px 4px; }
    .card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); border: 1px solid var(--border-color); margin-bottom: 16px; box-sizing: border-box; width: 100%; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #e5e5ea; }
    select, input {
      width: 100%; height: 48px; background-color: #2c2c2e; border: 1px solid var(--border-color);
      border-radius: 10px; color: #fff; font-size: 16px; padding: 0 14px; box-sizing: border-box; outline: none;
    }
    select:focus, input:focus { border-color: var(--accent-color); }
    .grid-buttons { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
    .btn-action { height: 46px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; width: 100%; }
    .btn-blue { background-color: var(--accent-color); } .btn-blue:active { background-color: var(--accent-active); }
    .btn-green { background-color: var(--success-color); } .btn-green:active { background-color: #24b34b; }
    .btn-orange { background-color: #ff9500; } .btn-orange:active { background-color: #e08500; }
    .btn-purple { background-color: #af52de; } .btn-purple:active { background-color: #963ec8; }
    .btn-brown { background-color: #ac8e68; } .btn-brown:active { background-color: #8d7454; }
    .btn-save { height: 54px; background-color: var(--success-color); font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(48, 209, 88, 0.2); }
    .btn-save:active { background-color: #24b34b; }
    
    .basket-card { background-color: #2c2c2e; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; border-left: 4px solid var(--accent-color); position: relative; box-sizing: border-box; width: 100%; }
    .basket-card.chew { border-left-color: #ff9500; } .basket-card.other { border-left-color: #af52de; } .basket-card.powder { border-left-color: #ac8e68; } .basket-card.veg { border-left-color: var(--success-color); }
    .basket-info { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .basket-sub { font-size: 13px; color: var(--text-muted); }
    .btn-inline-del { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--danger-color); font-size: 14px; font-weight: 600; cursor: pointer; }
    
    .client-item-card { background-color: #2c2c2e; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); cursor: pointer; box-sizing: border-box; }
    .client-main-row { display: flex; justify-content: space-between; align-items: center; }
    .client-title { font-size: 16px; font-weight: 700; color: #fff; }
    .client-badge { background-color: rgba(36, 139, 242, 0.15); color: var(--accent-color); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    
    .delivery-info-box { margin-top: 8px; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
    .delivery-line { display: flex; align-items: center; gap: 6px; }
    .delivery-line.time-alert { color: #ff9500; font-weight: 600; background-color: rgba(255, 149, 0, 0.1); padding: 4px 8px; border-radius: 6px; width: fit-content; border: 1px solid rgba(255, 149, 0, 0.2); }
    .delivery-line.addr-line { color: var(--text-muted); padding-left: 4px; }

    .client-order-details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-color); animation: fadeIn 0.15s ease; }
    .order-detail-line { font-size: 14px; color: #e5e5ea; padding: 5px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #3a3a3c; }
    .order-detail-line:last-child { border-bottom: none; }
    .order-detail-volume { font-weight: 700; color: var(--success-color); }
    
    .total-summary-badge { background: linear-gradient(135deg, #1d1d1f, #2c2c2e); padding: 14px; border-radius: 12px; border: 1px dashed var(--success-color); font-size: 15px; font-weight: 700; text-align: center; color: #fff; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(48, 209, 88, 0.15); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header-main">🏭 Бойня-Конвейер v4.0</div>
    
    <div class="nav-tabs">
      <button class="tab-link active" id="tabNewOrder" onclick="switchTab('orderScreen')">➕ Новый заказ</button>
      <button class="tab-link" id="tabViewClients" onclick="switchTab('clientsScreen')">📅 Записи на неделю</button>
    </div>
    <!-- ЭКРАН №1: ОФОРМЛЕНИЕ ЗАКАЗА -->
    <div id="orderScreen">
      <div class="card">
        <div class="form-group">
          <label>День отгрузки</label>
          <select id="day">
            <option value="Понедельник">Понедельник</option>
            <option value="Вторник">Вторник</option>
            <option value="Среда">Среда</option>
            <option value="Четверг">Четверг</option>
            <option value="Пятница">Пятница</option>
            <option value="Будущая неделя">Будущая неделя</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ник / Имя клиента в Telegram</label>
          <input type="text" id="client" placeholder="Например: Мария" autocomplete="off">
        </div>
        <div class="form-group">
          <label>🗺️ Адрес доставки</label>
          <input type="text" id="addressInput" placeholder="Улица, дом, квартира" autocomplete="off">
        </div>
        <div class="form-group">
          <label>⏱️ Примечание / Напоминалка курьеру</label>
          <input type="text" id="noteInput" placeholder="Например: Марине до 17:00" autocomplete="off">
        </div>
      </div>
      
      <div class="section-title">🛒 Корзина заказа</div>
      <div class="card" id="basketContainer"></div>
      
      <div class="section-title">➕ Добавить товар в чек</div>
      <div class="grid-buttons">
        <button class="btn-action btn-blue" onclick="openProductSelector('dressura')">🍖 Добавить Дрессуру</button>
        <button class="btn-action btn-orange" onclick="openProductSelector('chew')">🦴 Добавить Жевалки</button>
        <button class="btn-action btn-purple" onclick="openProductSelector('other')">📦 Добавить Другое</button>
        <button class="btn-action btn-brown" onclick="openProductSelector('powder')">✨ Добавить Присыпки</button>
        <button class="btn-action btn-green" onclick="openProductSelector('veg')">🍏 Добавить Овощи/Фрукты</button>
      </div>
      
      <!-- ВЫЕЗЖАЮЩЕЕ ОКНО ВВОДА ВЕСА/ШТУК -->
      <div class="card" id="selectorCard" style="display: none;">
        <h3 id="selectorTitle" style="margin-top:0; font-size:16px; color:var(--accent-color);">Выбор позиции</h3>
        <div class="form-group">
          <label>Наименование</label>
          <select id="mainSelect" onchange="onProductChange()"></select>
        </div>
        <div class="form-group" id="fractionGroup" style="display: none;">
          <label>Фракция нарезки</label>
          <select id="fractionSelect"></select>
        </div>
        <div class="form-group">
          <label id="valueLabel">Объем</label>
          <input type="number" id="volumeInput" placeholder="0" inputmode="numeric">
        </div>
        <button class="btn-action btn-blue" style="height:42px;" onclick="addItemToBasket()">✅ Подтвердить позицию</button>
      </div>
      
      <div style="margin-top: 30px;">
        <button class="btn-action btn-save" onclick="sendEntireOrder()">💾 Сохранить весь заказ</button>
      </div>
    </div>

    <!-- ЭКРАН №2: СПИСОК ЗАПИСЕЙ НА НЕДЕЛЮ -->
    <div id="clientsScreen" style="display: none;">
      <div class="card">
        <div class="form-group">
          <label>Выберите день для просмотра записей</label>
          <select id="viewDaySelect" onchange="loadClientsForDay()">
            <option value="">-- Выбрать день --</option>
            <option value="Понедельник">Понедельник</option>
            <option value="Вторник">Вторник</option>
            <option value="Среда">Среда</option>
            <option value="Четверг">Четверг</option>
            <option value="Пятница">Пятница</option>
            <option value="Будущая неделя">Будущая неделя</option>
          </select>
        </div>
      </div>

      <!-- СЮДА ВСТАВИТСЯ ОБЩИЙ СЧЕТЧИК КЛИЕНТОВ ДНЯ -->
      <div id="totalDaySummaryContainer"></div>

      <div class="section-title">👥 Записанные клиенты</div>
      <div class="card" id="clientsContainer">
        <p style="color:var(--text-muted); font-style:italic; margin:0;">Выберите день отгрузки выше для загрузки списка людей...</p>
      </div>
    </div>
  </div>
  <script>
    // ТВОЙ СОБСТВЕННЫЙ АДРЕС ВЕБХУКА ТАБЛИЦЫ, КОТОРЫЙ ТЫ СКОПИРОВАЛ ИЗ APPS SCRIPT
    const GOOGLE_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwWMPuVD-KuObrI_PQzs3gonyWX4xdYI8P9QlITz3bJGklWu7MoXuqo8BIOCzMTHiIn/exec";

    const catalog = {
      dressura: {
        title: "🍖 Новая Дрессура",
        items: ["ЛЁГКОЕ", "ПОЧКИ", "СЕРДЦЕ", "РУБЕЦ Т", "БАРАНЬЕ ЛЁГКОЕ"],
        fractions: {
          "ЛЁГКОЕ": ["Мелкое", "Среднее", "Большое", "Целое"],
          "СЕРДЦЕ": ["Мелкое", "Целое"],
          "ПОЧКИ": ["Мелкое", "Целое"],
          "РУБЕЦ Т": ["Мелкое", "Среднее", "Крупное", "Целое"],
          "БАРАНЬЕ ЛЁГКОЕ": ["Мелкое", "Среднее", "Целое"]
        }
      },
      chew: {
        title: "🦴 Новая Жевалка",
        items: ["БЫЧИЙ КОРЕНЬ", "ТРАХЕЯ", "АОРТА", "УХО Г", "НОСЫ шт.", "СТАНОВАЯ ЖИЛА", "КОЛЕНИ шт.", "КОПЫТО шт.", "ПЕРЕПЁЛКИ шт.", "ЛОП ХРЯЩ шт.", "УТИНЫЕ ШЕИ шт.", "ГУБЫ шт.", "КНИЖКА"],
        fractions: {
          "БЫЧИЙ КОРЕНЬ": ["ОЧ МАЛ", "МАЛ", "СРЕД", "БОЛ", "ОГР"],
          "ТРАХЕЯ": ["МАЛ", "ПЛАСТ", "СРЕД", "БОЛ", "ОГР"],
          "СТАНОВАЯ ЖИЛА": ["ПАЛК", "СРЕД", "БОЛ"],
          "УХО Г": ["Обычное", "ПОЛОВИНКА"],
          "АОРТА": ["ПОЛОВИНКА", "Обычная"]
        }
      },
      other: {
        title: "📦 Новая Позиция (Другое)",
        items: ["ПЕЧЕНЬ", "СВЕТЛЫЙ РУБЕЦ", "ИНДЕЙКА", "МЯСНЫЕ ЛОМТИКИ", "ВЫМЯ", "СЕМЕННИКИ", "ПИКАЛЬНОЕ МЯСО"],
        fractions: {}
      },
      powder: {
        title: "✨ Новая Присыпка",
        items: ["КРОШКА РУБЕЦ", "КРОШКА ЛЁГКОГО", "КРОШКА ПОЧЕК"],
        fractions: {}
      },
      veg: {
        title: "🍏 Новый Овощ / Фрукт",
        items: ["БАНАНЫ", "ЯБЛОКИ", "ГРУШИ", "МОРКОВЬ", "ТЫКВА", "БАТАТ"],
        fractions: {}
      }
    };

    let basket = [];
    let currentCategory = "";

    function switchTab(screenId) {
      document.getElementById('orderScreen').style.display = (screenId === 'orderScreen') ? 'block' : 'none';
      document.getElementById('clientsScreen').style.display = (screenId === 'clientsScreen') ? 'block' : 'none';
      
      document.getElementById('tabNewOrder').classList.toggle('active', screenId === 'orderScreen');
      document.getElementById('tabViewClients').classList.toggle('active', screenId === 'clientsScreen');
    }

    function openProductSelector(catKey) {
      currentCategory = catKey;
      const cat = catalog[catKey];
      
      document.getElementById('selectorTitle').innerText = cat.title;
      document.getElementById('selectorCard').style.display = "block";
      
      let itemHtml = '<option value="">-- Выбрать из списка --</option>';
      cat.items.forEach(name => { itemHtml += `<option value="${name}">${name}</option>`; });
      
      const mainSelect = document.getElementById('mainSelect');
      mainSelect.innerHTML = itemHtml;
      
      document.getElementById('fractionGroup').style.display = "none";
      document.getElementById('volumeInput').value = "";
      
      document.getElementById('valueLabel').innerText = (catKey === 'chew') ? "Количество (в шт.)" : "Вес (в граммах)";
    }

    function onProductChange() {
      const mainVal = document.getElementById('mainSelect').value;
      const fracGroup = document.getElementById('fractionGroup');
      const fracSelect = document.getElementById('fractionSelect');
      const valLabel = document.getElementById('valueLabel');
      const cat = catalog[currentCategory];
      
      if (mainVal === "ПЕРЕПЁЛКИ шт." || currentCategory === 'chew') { 
        valLabel.innerText = "Количество (в шт.)"; 
      } else { 
        valLabel.innerText = "Вес (в граммах)"; 
      }
      
      if (cat.fractions && cat.fractions[mainVal]) {
        fracGroup.style.display = "block";
        let fracHtml = "";
        cat.fractions[mainVal].forEach(f => { fracHtml += `<option value="${f}">${f}</option>`; });
        fracSelect.innerHTML = fracHtml;
      } else { 
        fracGroup.style.display = "none"; 
        fracSelect.innerHTML = ""; 
      }
    }

    function addItemToBasket() {
      const mainVal = document.getElementById('mainSelect').value;
      const fracVal = document.getElementById('fractionSelect').value;
      const inputVal = Number(document.getElementById('volumeInput').value) || 0;
      
      if (!mainVal) { alert("❌ Выберите наименование!"); return; }
      if (inputVal <= 0) { alert("❌ Укажите количество/вес больше нуля!"); return; }
      
      const uniqueId = Date.now();
      basket.push({ id: uniqueId, cat: currentCategory, main: mainVal, sub: fracVal, value: inputVal });
      renderBasket();
      
      document.getElementById('selectorCard').style.display = "none";
    }

    function renderBasket() {
      const container = document.getElementById('basketContainer'); 
      container.innerHTML = "";
      
      if (basket.length === 0) { 
        container.innerHTML = `<p style="color:var(--text-muted); font-style:italic; margin:4px 0 0 4px;">Корзина пуста. Добавьте позиции ниже...</p>`; 
        return; 
      }
      
      basket.forEach(item => {
        let itemTitle = item.main; 
        let subText = ""; 
        let unit = (item.cat === 'chew' || item.main === "ПЕРЕПЁЛКИ шт.") ? " шт." : " гр";
        
        if (item.cat === "dressura") { subText = "Фракция: " + item.sub; } 
        else if (item.cat === "chew" && catalog.chew.fractions[item.main]) { subText = "Тип нарезки: " + item.sub; } 
        else { subText = "Категория: " + item.cat.toUpperCase(); }
        
        container.innerHTML += `
          <div class="basket-card ${item.cat}">
            <button class="btn-inline-del" onclick="deleteBasketItem(${item.id})">Удалить</button>
            <div class="basket-info">${itemTitle} → ${item.value}${unit}</div>
            <div class="basket-sub">${subText}</div>
          </div>`;
      });
    }

    function deleteBasketItem(id) { 
      basket = basket.filter(item => item.id !== id); 
      renderBasket(); 
    }

    function sendEntireOrder() {
      const clientName = document.getElementById('client').value.trim();
      const clientAddress = document.getElementById('addressInput').value.trim();
      const clientNote = document.getElementById('noteInput').value.trim();
      
      if (!clientName) { alert("❌ Введите имя/ник клиента!"); return; }
      if (basket.length === 0) { alert("❌ Корзина пуста! Добавьте товары."); return; }
      
      if (confirm("Записать весь заказ (" + basket.length + " поз.) для клиента " + clientName + " в базу?")) {
        fetch(GOOGLE_WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            action: "saveOrder", 
            day: document.getElementById('day').value, 
            client: clientName, 
            address: clientAddress, 
            note: clientNote,       
            basket: basket 
          })
        });
        alert("🎉 Весь заказ успешно отправлен в таблицу! Склад обновился.");
        basket = []; 
        renderBasket(); 
        document.getElementById('client').value = "";
        document.getElementById('addressInput').value = "";
        document.getElementById('noteInput').value = "";
      }
    }

    function loadClientsForDay() {
      const selectedDay = document.getElementById('viewDaySelect').value;
      const container = document.getElementById('clientsContainer');
      const summaryContainer = document.getElementById('totalDaySummaryContainer');
      
      if (!selectedDay) { 
        container.innerHTML = `<p style="color:var(--text-muted); font-style:italic; margin:0;">Выберите день отгрузки выше для загрузки списка людей...</p>`; 
        summaryContainer.innerHTML = "";
        return; 
      }
      
      container.innerHTML = `<p style="color:var(--accent-color); font-weight:600; margin:0;">⏳ Выгружаю людей из таблицы...</p>`;
      summaryContainer.innerHTML = "";
      
      const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
      
      window[callbackName] = function(res) {
        if (res.status === "success" && res.clients && res.clients.length > 0) {
          container.innerHTML = "";
          let totalClientsCount = res.clients.length; // Считаем ОБЩЕЕ КОЛИЧЕСТВО КЛИЕНТОВ НА ДЕНЬ

          res.clients.forEach((client, index) => {
            let basketHtml = "";
            if (client.basket && client.basket.length > 0) {
              client.basket.forEach(goods => {
                basketHtml += `
                  <div class="order-detail-line">
                    <span>• ${goods.name}</span>
                    <span class="order-detail-volume">${goods.val} ${goods.unit}</span>
                  </div>`;
              });
            } else {
              basketHtml = `<p style="color:var(--text-muted); font-style:italic; margin:0; font-size:13px;">В чеке пока нет активных позиций.</p>`;
            }

            // Выводим блоки адреса и времени курьера только если они реально заполнены в ячейках
            let deliveryBoxHtml = "";
            if (client.address || client.note) {
              let addrLine = client.address ? `<div class="delivery-line addr-line">📍 Адрес: ${client.address}</div>` : "";
              let noteLine = client.note ? `<div class="delivery-line time-alert">⏱️ Примечание: ${client.note}</div>` : "";
              deliveryBoxHtml = `<div class="delivery-info-box">${noteLine}${addrLine}</div>`;
            }

            container.innerHTML += `
              <div class="client-item-card" onclick="toggleOrderDetail(${index})">
                <div class="client-main-row">
                  <span class="client-title">${index + 1}. ${client.name}</span>
                  <span class="client-badge">${client.orderCount} поз.</span>
                </div>
                ${deliveryBoxHtml}
                <div class="client-order-details" id="details_${index}">
                  ${basketHtml}
                </div>
              </div>`;
          });

          // ВЫВОДИМ ЖИРНЫЙ КОРРЕКТНЫЙ СЧЕТЧИК КЛИЕНТОВ НА ДЕНЬ В САМЫЙ ВЕРХ СТРАНИЦЫ
          summaryContainer.innerHTML = `
            <div class="total-summary-badge">
              📊 Всего клиентов на ${selectedDay}: <span style="color:var(--success-color); font-size:17px; font-weight:800;">${totalClientsCount} чел.</span>
            </div>`;

        } else {
          container.innerHTML = `<p style="color:var(--text-muted); font-style:italic; margin:0;">🚫 На этот день пока никто не записан.</p>`;
          summaryContainer.innerHTML = "";
        }
        document.body.removeChild(script);
        delete window[callbackName];
      };

      const script = document.createElement('script');
      script.src = GOOGLE_WEBHOOK_URL + '?action=getClients&day=' + encodeURIComponent(selectedDay) + '&callback=' + callbackName;
      document.body.appendChild(script);
    }

    function toggleOrderDetail(index) {
      const detailsBlock = document.getElementById(`details_${index}`);
      if (detailsBlock) {
        const isHidden = detailsBlock.style.display === 'none' || detailsBlock.style.display === '';
        detailsBlock.style.display = isHidden ? 'block' : 'none';
      }
    }

    renderBasket();
  </script>
</body>
</html>
