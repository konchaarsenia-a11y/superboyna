<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Конвейер Бойня</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #121212; --card-bg: #1c1c1e; --text-color: #f5f5f7;
      --text-muted: #8e8e93; --accent-color: #248bf2; --accent-active: #1472df;
      --danger-color: #ff453a; --success-color: #30d158; --border-color: #2c2c2e;
      --safe-top: max(12px, env(safe-area-inset-top, 0px), var(--tg-safe-area-inset-top, 0px), var(--tg-content-safe-area-inset-top, 0px));
      --safe-bottom: max(16px, env(safe-area-inset-bottom, 0px), var(--tg-safe-area-inset-bottom, 0px), var(--tg-content-safe-area-inset-bottom, 0px));
    }
    * { box-sizing: border-box; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg-color); color: var(--text-color);
      margin: 0; padding: 0; width: 100%; min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      padding: 16px;
      padding-top: calc(16px + var(--safe-top));
      padding-bottom: calc(72px + var(--safe-bottom));
      max-width: 640px; margin: 0 auto;
    }
    .bottom-spacer {
      height: calc(28px + var(--safe-bottom));
      width: 100%;
      pointer-events: none;
    }
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.65); align-items: flex-end; justify-content: center;
      padding: 16px; padding-bottom: calc(16px + var(--safe-bottom));
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      width: 100%; max-width: 420px; background: #1c1c1e; border: 1px solid var(--border-color);
      border-radius: 16px; padding: 18px; color: #fff;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
    .modal-text { font-size: 14px; color: #d1d1d6; line-height: 1.4; margin-bottom: 16px; white-space: pre-wrap; }
    .modal-actions { display: grid; gap: 8px; }
    .modal-actions.row { grid-template-columns: 1fr 1fr; }
    .modal-day-btn {
      height: 44px; border-radius: 10px; border: 1px solid var(--border-color);
      background: #2c2c2e; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .modal-day-btn:active { background: #3a3a3c; }
    .toast {
      display: none; position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(24px + var(--safe-bottom)); z-index: 10000;
      background: #2c2c2e; border: 1px solid var(--border-color); color: #fff;
      padding: 12px 16px; border-radius: 12px; font-size: 14px; max-width: 90%;
    }
    .toast.show { display: block; }
    .header-main { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 12px; }
    .nav-tabs {
      display: flex; gap: 6px; margin-bottom: 16px; background: #1c1c1e;
      padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); overflow-x: auto;
    }
    .tab-link {
      flex: 1 0 auto; min-width: 72px; text-align: center; background: none; border: none;
      color: var(--text-muted); padding: 10px 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border-radius: 8px;
    }
    .tab-link.active { background: var(--accent-color); color: #fff; }
    .section-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted); margin: 20px 0 8px 4px;
    }
    .card {
      background: var(--card-bg); border-radius: 12px; padding: 14px;
      border: 1px solid var(--border-color); margin-bottom: 12px; width: 100%;
    }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #e5e5ea; }
    select, input[type="text"], input[type="number"] {
      width: 100%; height: 46px; background: #2c2c2e; border: 1px solid var(--border-color);
      border-radius: 10px; color: #fff; font-size: 16px; padding: 0 12px; outline: none;
    }
    select:focus, input:focus { border-color: var(--accent-color); }
    .grid-buttons { display: grid; gap: 8px; margin-bottom: 16px; }
    .btn-action {
      height: 44px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600;
      color: #fff; cursor: pointer; width: 100%;
    }
    .btn-blue { background: var(--accent-color); }
    .btn-green { background: var(--success-color); color: #052e12; }
    .btn-orange { background: #ff9500; }
    .btn-purple { background: #af52de; }
    .btn-brown { background: #ac8e68; }
    .btn-save {
      height: 52px; background: var(--success-color); font-size: 15px; font-weight: 700;
      text-transform: uppercase; width: 100%; border: none; border-radius: 10px; color: #052e12; cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.55; cursor: wait; }
    .basket-card {
      background: #2c2c2e; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
      border-left: 4px solid var(--accent-color); position: relative;
    }
    .basket-card.chew { border-left-color: #ff9500; }
    .basket-card.other { border-left-color: #af52de; }
    .basket-card.powder { border-left-color: #ac8e68; }
    .basket-card.veg { border-left-color: var(--success-color); }
    .basket-info { font-size: 15px; font-weight: 600; margin-bottom: 4px; padding-right: 70px; }
    .basket-sub { font-size: 13px; color: var(--text-muted); }
    .btn-inline-del {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--danger-color); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .client-item-card {
      background: #1c1c1e; border-radius: 12px; padding: 12px; margin-bottom: 10px;
      border: 1px solid var(--border-color);
    }
    .client-main-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .client-title { font-size: 15px; font-weight: 700; }
    .client-right-block { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .crm-mini-btn {
      width: 34px; height: 34px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px;
    }
    .crm-edit { background: rgba(255,149,0,0.15); color: #ff9500; }
    .crm-move { background: rgba(175,82,222,0.15); color: #af52de; }
    .crm-delete { background: rgba(255,69,58,0.15); color: #ff453a; }
    .client-badge { font-size: 12px; color: var(--text-muted); }
    .delivery-info-box { margin-top: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid #2c2c2e; padding-top: 8px; }
    .delivery-line.time-alert {
      color: #ff9500; font-weight: 600; background: rgba(255,149,0,0.1);
      padding: 4px 8px; border-radius: 6px; width: fit-content;
    }
    .delivery-line.addr-line { color: var(--text-muted); }
    .client-order-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color); }
    .order-detail-line {
      font-size: 14px; color: #e5e5ea; padding: 5px 0; display: flex; justify-content: space-between;
      border-bottom: 1px solid #3a3a3c; gap: 8px;
    }
    .order-detail-volume { font-weight: 700; color: var(--success-color); white-space: nowrap; }
    .total-summary-badge {
      background: linear-gradient(135deg, #1d1d1f, #2c2c2e); padding: 12px; border-radius: 12px;
      border: 1px dashed var(--success-color); font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 12px;
    }
    .cut-row, .courier-row {
      display: grid; gap: 8px; padding: 12px; margin-bottom: 10px;
      background: #1c1c1e; border: 1px solid var(--border-color); border-radius: 12px;
    }
    .cut-row.done { border-color: rgba(48,209,88,0.45); background: rgba(48,209,88,0.08); }
    .cut-title { font-weight: 700; font-size: 15px; }
    .cut-meta { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .cut-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .cut-actions input[type="number"] { width: 110px; height: 40px; }
    .check-line { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .check-line input { width: 20px; height: 20px; }
    .muted { color: var(--text-muted); font-style: italic; }
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header-main" id="appHeaderTitle">Бойня-Конвейер v5.0</div>

    <div class="nav-tabs">
      <button class="tab-link active" data-screen="orderScreen" onclick="switchTab('orderScreen')">Заказ</button>
      <button class="tab-link" data-screen="clientsScreen" onclick="switchTab('clientsScreen')">Неделя</button>
      <button class="tab-link" data-screen="cuttingScreen" onclick="switchTab('cuttingScreen')">Нарезка</button>
      <button class="tab-link" data-screen="courierScreen" onclick="switchTab('courierScreen')">Курьер</button>
    </div>

    <!-- МЕНЕДЖЕР: ПРИЁМ -->
    <div id="orderScreen" class="screen active">
      <div class="card">
        <input type="hidden" id="isEditMode" value="false">
        <div class="form-group">
          <label>День отгрузки</label>
          <select id="day">
            <option>Понедельник</option><option>Вторник</option><option>Среда</option>
            <option>Четверг</option><option>Пятница</option><option>Будущая неделя</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ник / Имя клиента</label>
          <input type="text" id="client" placeholder="Например: Мария" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Адрес доставки</label>
          <input type="text" id="addressInput" placeholder="Улица, дом, квартира" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Примечание курьеру</label>
          <input type="text" id="noteInput" placeholder="Например: до 17:00" autocomplete="off">
        </div>
      </div>

      <div class="section-title">Корзина</div>
      <div class="card" id="basketContainer"></div>

      <div class="section-title">Добавить товар</div>
      <div class="grid-buttons">
        <button class="btn-action btn-blue" onclick="openProductSelector('dressura')">Дрессура</button>
        <button class="btn-action btn-orange" onclick="openProductSelector('chew')">Жевалки</button>
        <button class="btn-action btn-purple" onclick="openProductSelector('other')">Другое</button>
        <button class="btn-action btn-brown" onclick="openProductSelector('powder')">Присыпки</button>
        <button class="btn-action btn-green" onclick="openProductSelector('veg')">Овощи/Фрукты</button>
      </div>

      <div class="card" id="selectorCard" style="display:none;">
        <div class="form-group">
          <label id="selectorTitle">Позиция</label>
          <select id="mainSelect" onchange="onProductChange()"></select>
        </div>
        <div class="form-group" id="fractionGroup" style="display:none;">
          <label>Фракция / тип</label>
          <select id="fractionSelect"></select>
        </div>
        <div class="form-group">
          <label id="valueLabel">Объём</label>
          <input type="number" id="volumeInput" placeholder="0" inputmode="numeric">
        </div>
        <button class="btn-action btn-blue" onclick="addItemToBasket()">В корзину</button>
      </div>

      <button class="btn-save" id="btnMainSave" onclick="sendEntireOrder()">Сохранить заказ</button>
    </div>

    <!-- МЕНЕДЖЕР: НЕДЕЛЯ -->
    <div id="clientsScreen" class="screen">
      <div class="card">
        <div class="form-group">
          <label>День для просмотра</label>
          <select id="viewDaySelect" onchange="loadClientsForDay()">
            <option value="">-- Выбрать день --</option>
            <option>Понедельник</option><option>Вторник</option><option>Среда</option>
            <option>Четверг</option><option>Пятница</option><option>Будущая неделя</option>
          </select>
        </div>
      </div>
      <div id="totalDaySummaryContainer"></div>
      <div class="section-title">Клиенты</div>
      <div class="card" id="clientsContainer"><p class="muted">Выберите день...</p></div>
    </div>

    <!-- НАРЕЗЧИК -->
    <div id="cuttingScreen" class="screen">
      <div class="card">
        <div class="form-group">
          <label>День нарезки</label>
          <select id="cuttingDaySelect" onchange="loadCutting()">
            <option value="">-- Выбрать день --</option>
            <option>Понедельник</option><option>Вторник</option><option>Среда</option>
            <option>Четверг</option><option>Пятница</option><option>Будущая неделя</option>
          </select>
        </div>
      </div>
      <div id="cuttingSummary"></div>
      <div id="cuttingContainer"><p class="muted">Выберите день...</p></div>
    </div>

    <!-- КУРЬЕР -->
    <div id="courierScreen" class="screen">
      <div class="card">
        <div class="form-group">
          <label>День доставки</label>
          <select id="courierDaySelect" onchange="loadCourier()">
            <option value="">-- Выбрать день --</option>
            <option>Понедельник</option><option>Вторник</option><option>Среда</option>
            <option>Четверг</option><option>Пятница</option>
          </select>
        </div>
        <button class="btn-action btn-blue" onclick="openYandexMaps()">Открыть адреса в Яндекс.Картах</button>
      </div>
      <div id="courierSummary"></div>
      <div id="courierContainer"><p class="muted">Выберите день...</p></div>
    </div>

    <div class="bottom-spacer" aria-hidden="true"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="onModalOverlayClick(event)">
    <div class="modal-sheet" id="modalSheet"></div>
  </div>
  <div class="toast" id="appToast"></div>

  <script>
    const GOOGLE_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzph2uAYgSd3Ja5XDoi647YkAIRDw2SfRIcgEUlaDW82aLpbzkgS36Zq9V5QXxqPNF7/exec";
    const DEFAULT_CITY = "Минск";

    // Пока всем 4 вкладки. Позже: "manager" | "cutter" | "courier" | "all"
    const APP_ROLE = "all";
    const ROLE_TABS = {
      all: ["orderScreen", "clientsScreen", "cuttingScreen", "courierScreen"],
      manager: ["orderScreen", "clientsScreen"],
      cutter: ["cuttingScreen"],
      courier: ["courierScreen"]
    };

    let tg = null;
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (e) {}
        try {
          if (tg.setHeaderColor) tg.setHeaderColor("#121212");
          if (tg.setBackgroundColor) tg.setBackgroundColor("#121212");
        } catch (e) {}
        // Если открыли из списка чатов на весь экран — выходим из fullscreen,
        // чтобы системные кнопки не наезжали (Bot API 8+). Иначе увеличим отступы.
        try {
          if (tg.isFullscreen && typeof tg.exitFullscreen === "function") {
            tg.exitFullscreen();
          }
        } catch (e) {}
      }
    } catch (e) {}

    function applyTelegramSafeArea() {
      var top = 12;
      var bottom = 20;
      try {
        if (tg) {
          var sa = tg.safeAreaInset || {};
          var csa = tg.contentSafeAreaInset || {};
          top = Math.max(top, Number(sa.top) || 0, Number(csa.top) || 0);
          bottom = Math.max(bottom, Number(sa.bottom) || 0, Number(csa.bottom) || 0);
          if (tg.isFullscreen) bottom = Math.max(bottom, 34);
          // На многих Android в Telegram env() = 0 — запас под жестовую/3-кнопочную панель
          bottom = Math.max(bottom, 28);
        }
      } catch (e) {}
      document.documentElement.style.setProperty("--safe-top", top + "px");
      document.documentElement.style.setProperty("--safe-bottom", bottom + "px");
    }

    applyTelegramSafeArea();
    if (tg && typeof tg.onEvent === "function") {
      ["safeAreaChanged", "contentSafeAreaChanged", "fullscreenChanged", "viewportChanged"].forEach(function (ev) {
        try { tg.onEvent(ev, applyTelegramSafeArea); } catch (e) {}
      });
    }
    window.addEventListener("resize", applyTelegramSafeArea);

    let modalResolver = null;

    function recoverUiFocus() {
      try {
        if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
      } catch (e) {}
      document.body.style.pointerEvents = "auto";
      document.documentElement.style.pointerEvents = "auto";
      // Telegram WebView иногда «залипает» после системных диалогов
      setTimeout(function () {
        window.scrollTo(0, window.scrollY || 0);
      }, 50);
    }

    function showToast(msg) {
      const el = document.getElementById("appToast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () { el.classList.remove("show"); }, 2200);
    }

    function closeModal(result) {
      const overlay = document.getElementById("modalOverlay");
      overlay.classList.remove("open");
      document.getElementById("modalSheet").innerHTML = "";
      const resolver = modalResolver;
      modalResolver = null;
      recoverUiFocus();
      if (resolver) resolver(result);
    }

    function onModalOverlayClick(event) {
      if (event.target && event.target.id === "modalOverlay") closeModal(null);
    }

    function openModal(html) {
      return new Promise(function (resolve) {
        if (modalResolver) closeModal(null);
        modalResolver = resolve;
        document.getElementById("modalSheet").innerHTML = html;
        document.getElementById("modalOverlay").classList.add("open");
      });
    }

    function uiAlert() { return uiAlertAsync.apply(null, arguments); }

    async function uiAlertAsync(message) {
      const p = openModal(
        '<div class="modal-title">Сообщение</div>' +
        '<div class="modal-text">' + escapeHtml(String(message)) + '</div>' +
        '<div class="modal-actions"><button class="btn-action btn-blue" type="button" id="modalOk">ОК</button></div>'
      );
      setTimeout(function () {
        const btn = document.getElementById("modalOk");
        if (btn) btn.onclick = function () { closeModal(true); };
      }, 0);
      await p;
      recoverUiFocus();
    }

    async function uiConfirmAsync(message) {
      const p = openModal(
        '<div class="modal-title">Подтверждение</div>' +
        '<div class="modal-text">' + escapeHtml(String(message)) + '</div>' +
        '<div class="modal-actions row">' +
          '<button class="btn-action" type="button" id="modalCancel" style="background:#3a3a3c;">Отмена</button>' +
          '<button class="btn-action btn-blue" type="button" id="modalOk">Да</button>' +
        '</div>'
      );
      setTimeout(function () {
        const ok = document.getElementById("modalOk");
        const cancel = document.getElementById("modalCancel");
        if (ok) ok.onclick = function () { closeModal(true); };
        if (cancel) cancel.onclick = function () { closeModal(false); };
      }, 0);
      const res = await p;
      recoverUiFocus();
      return !!res;
    }

    async function uiPickMoveDay(clientName) {
      const days = [
        ["Понедельник", "Пн"], ["Вторник", "Вт"], ["Среда", "Ср"],
        ["Четверг", "Чт"], ["Пятница", "Пт"], ["Будущая неделя", "Будущая"]
      ];
      const buttons = days.map(function (d) {
        return '<button class="modal-day-btn" type="button" data-day="' + d[0] + '">' + d[1] + " — " + d[0] + "</button>";
      }).join("");
      const p = openModal(
        '<div class="modal-title">Перенос: ' + escapeHtml(clientName) + '</div>' +
        '<div class="modal-text">Выберите день</div>' +
        '<div class="modal-actions">' + buttons +
          '<button class="btn-action" type="button" id="modalCancel" style="background:#3a3a3c;margin-top:6px;">Отмена</button>' +
        '</div>'
      );
      setTimeout(function () {
        document.querySelectorAll(".modal-day-btn").forEach(function (btn) {
          btn.onclick = function () { closeModal(btn.getAttribute("data-day")); };
        });
        const cancel = document.getElementById("modalCancel");
        if (cancel) cancel.onclick = function () { closeModal(null); };
      }, 0);
      const res = await p;
      recoverUiFocus();
      return res;
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    const catalog = {
      dressura: {
        title: "Дрессура",
        items: ["ЛЁГКОЕ", "ПОЧКИ", "СЕРДЦЕ", "РУБЕЦ Т", "БАРАНЬЕ ЛЁГКОЕ"],
        fractions: {
          "ЛЁГКОЕ": ["Мелкое", "Среднее", "Большое", "Целое"],
          "СЕРДЦЕ": ["Мелкое", "Целое"],
          "ПОЧКИ": ["Мелкое", "Целое"],
          "РУБЕЦ Т": ["Мелкое", "Среднее", "Крупное", "Целое"],
          "БАРАНЬЕ ЛЁГКОЕ": ["Мелкое", "Среднее", "Целое"]
        }
      },
      chew: {
        title: "Жевалки",
        items: ["БЫЧИЙ КОРЕНЬ", "ТРАХЕЯ", "АОРТА", "УХО Г", "НОСЫ шт.", "СТАНОВАЯ ЖИЛА", "КОЛЕНИ шт.", "КОПЫТО шт.", "ПЕРЕПЁЛКИ шт.", "ЛОП ХРЯЩ шт.", "УТИНЫЕ ШЕИ шт.", "ГУБЫ шт.", "КНИЖКА"],
        fractions: {
          "БЫЧИЙ КОРЕНЬ": ["ОЧ МАЛ", "МАЛ", "СРЕД", "БОЛ", "ОГР"],
          "ТРАХЕЯ": ["МАЛ", "ПЛАСТ", "СРЕД", "БОЛ", "ОГР"],
          "СТАНОВАЯ ЖИЛА": ["ПАЛК", "СРЕД", "БОЛ"],

    /** JSONP GET */
    function apiGet(params) {
      return new Promise((resolve, reject) => {
        const cb = "cb_" + Math.round(Math.random() * 1e9);
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("Таймаут ответа сервера"));
        }, 45000);
        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          const s = document.getElementById(cb);
          if (s) s.remove();
        }
        window[cb] = function (res) {
          cleanup();
          resolve(res);
        };
        const q = Object.keys(params).map(k => k + "=" + encodeURIComponent(params[k])).join("&");
        const script = document.createElement("script");
        script.id = cb;
        script.src = GOOGLE_WEBHOOK_URL + "?" + q + "&callback=" + cb;
        script.onerror = function () {
          cleanup();
          reject(new Error("Ошибка сети"));
        };
        document.body.appendChild(script);
      });
    }

    /** POST text/plain — Apps Script читает JSON из тела; после — проверка через GET */
    function apiPost(payload) {
      return fetch(GOOGLE_WEBHOOK_URL, {
        method: "POST",
        redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      }).then(function () {
        return { status: "sent" };
      }).catch(function () {
        // CORS opaque часто даёт ошибку даже если скрипт отработал — вызывающий код проверяет через GET
        return { status: "sent_opaque" };
      });
    }

    async function sendEntireOrder() {
      const clientName = document.getElementById("client").value.trim();
      const clientAddress = document.getElementById("addressInput").value.trim();
      const clientNote = document.getElementById("noteInput").value.trim();
      const day = document.getElementById("day").value;
      const isEdit = document.getElementById("isEditMode").value === "true";
      if (!clientName) { await uiAlertAsync("Введите имя клиента"); return; }
      if (!basket.length) { await uiAlertAsync("Корзина пуста"); return; }
      const okConfirm = await uiConfirmAsync(isEdit ? ("Обновить заказ " + clientName + "?") : ("Сохранить заказ " + clientName + "?"));
      if (!okConfirm) return;

      const btn = document.getElementById("btnMainSave");
      btn.disabled = true;
      btn.innerText = "Сохраняю...";

      const payload = {
        action: "saveOrder",
        day: day,
        client: clientName,
        address: clientAddress,
        note: clientNote,
        basket: basket.map(x => ({
          cat: x.cat,
          main: x.main,
          name: x.main,
          sub: x.sub || "",
          value: x.value,
          val: x.value
        }))
      };

      try {
        await apiPost(payload);
        await new Promise(r => setTimeout(r, 1500));
        const check = await apiGet({ action: "getClients", day: day });
        const found = (check.clients || []).find(c => String(c.name).toUpperCase() === clientName.toUpperCase());
        const okPositions = found && found.basket && found.basket.length > 0;
        if (!okPositions) {
          await uiAlertAsync("Имя/адрес могли записаться, но позиции не нашлись в таблице. Проверьте Deploy Code.gs.");
          return;
        }
        showToast(isEdit ? ("Заказ обновлён (" + found.basket.length + " поз.)") : ("Заказ сохранён (" + found.basket.length + " поз.)"));
        document.getElementById("isEditMode").value = "false";
        document.getElementById("client").readOnly = false;
        document.getElementById("client").value = "";
        document.getElementById("addressInput").value = "";
        document.getElementById("noteInput").value = "";
        basket = [];
        renderBasket();
        document.getElementById("appHeaderTitle").innerText = "Бойня-Конвейер v5.0";
      } catch (err) {
        await uiAlertAsync("Ошибка: " + (err.message || err));
      } finally {
        btn.disabled = false;
        btn.innerText = "Сохранить заказ";
        recoverUiFocus();
      }
    }

    function normalizeAddressForMaps(addr) {
      const a = String(addr || "").trim();
      if (!a) return "";
      if (/минск/i.test(a)) return a;
      return DEFAULT_CITY + ", " + a;
    }

    function buildYandexRouteUrl(addrs) {
      const u = new URL("https://yandex.ru/maps/");
      u.searchParams.set("mode", "routes");
      u.searchParams.set("rtt", "auto");
      u.searchParams.set("rtext", addrs.join("~"));
      return u.toString();
    }

    function buildYandexPointUrl(addr) {
      const u = new URL("https://yandex.ru/maps/");
      u.searchParams.set("text", addr);
      return u.toString();
    }

    function openExternalLink(url) {
      try {
        if (tg && typeof tg.openLink === "function") {
          tg.openLink(url, { try_instant_view: false });
          return true;
        }
      } catch (e) {}
      try {
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(function () { a.remove(); }, 300);
        return true;
      } catch (e2) {}
      try {
        window.location.href = url;
        return true;
      } catch (e3) {
        return false;
      }
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) {}
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      } catch (e2) {
        return false;
      }
    }

    /**
     * В Telegram второе окно (maps.html) часто НЕ открывается.
     * Поэтому показываем адреса прямо в мини-аппе, а Яндекс открываем по кнопке.
     */
    async function openYandexMaps() {
      const addrs = courierClientsCache.map(c => normalizeAddressForMaps(c.address)).filter(Boolean);
      if (!addrs.length) {
        await uiAlertAsync("Нет адресов для маршрута. Сначала загрузите день и заполните адреса у клиентов.");
        return;
      }

      const listHtml = addrs.map(function (a, i) {
        return '<div style="padding:8px 0;border-bottom:1px solid #2c2c2e;font-size:14px;">' +
          (i + 1) + ". " + escapeHtml(a) + "</div>";
      }).join("");

      const p = openModal(
        '<div class="modal-title">Адреса на маршрут</div>' +
        '<div class="modal-text" style="max-height:40vh;overflow:auto;margin-bottom:12px;">' + listHtml + "</div>" +
        '<div class="modal-actions">' +
          '<button class="btn-action btn-green" type="button" id="mapsBuild">Построить маршрут в Яндекс</button>' +
          '<button class="btn-action btn-blue" type="button" id="mapsCopy">Скопировать адреса</button>' +
          '<button class="btn-action" type="button" id="modalCancel" style="background:#3a3a3c;">Закрыть</button>' +
        "</div>"
      );

      setTimeout(function () {
        const build = document.getElementById("mapsBuild");
        const copy = document.getElementById("mapsCopy");
        const cancel = document.getElementById("modalCancel");
        if (build) {
          build.onclick = function () {
            // Важно: openLink вызываем сразу по нажатию кнопки (жест пользователя)
            openExternalLink(buildYandexRouteUrl(addrs));
            showToast("Открываю Яндекс.Карты…");
          };
        }
        if (copy) {
          copy.onclick = async function () {
            const text = addrs.map(function (a, i) { return (i + 1) + ". " + a; }).join("\n");
            const ok = await copyText(text);
            showToast(ok ? "Адреса скопированы" : "Не удалось скопировать");
          };
        }
        if (cancel) cancel.onclick = function () { closeModal(true); };
      }, 0);

      await p;
      recoverUiFocus();
    }

    renderBasket();
    applyRoleTabs();
    applyTelegramSafeArea();
    recoverUiFocus();
  </script>
</body>
</html>
